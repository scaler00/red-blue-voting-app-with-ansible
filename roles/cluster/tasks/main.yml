---
# ============================================================
# Role: cluster
# Runs on: ALL nodes (k8s_cluster)
# Purpose:
#   Master  → kubeadm init, kubectl config, Calico CNI,
#             generate join command
#   Workers → kubeadm join using join command from master
# Key concepts: register, set_fact, hostvars, when, command
# ============================================================

# ---- Master: initialise the control plane -------------------

- name: Check if cluster is already initialised
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeconfig_stat
  when: inventory_hostname in groups['k8s_master']

- name: Initialise Kubernetes cluster (master only)
  ansible.builtin.command:
    cmd: >
      kubeadm init
      --pod-network-cidr={{ pod_network_cidr }}
      --service-cidr={{ service_cidr }}
      --apiserver-advertise-address={{ ansible_default_ipv4.address }}
  register: kubeadm_init
  when:
    - inventory_hostname in groups['k8s_master']
    - not kubeconfig_stat.stat.exists
  changed_when: "'Your Kubernetes control-plane has initialized successfully' in kubeadm_init.stdout"

- name: Create .kube directory for ubuntu user (master only)
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  when: inventory_hostname in groups['k8s_master']

- name: Copy admin.conf to ubuntu kubeconfig (master only)
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  when: inventory_hostname in groups['k8s_master']

- name: Install Calico CNI network plugin (master only)
  ansible.builtin.command:
    cmd: kubectl apply -f {{ calico_manifest_url }}
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: calico_apply
  when: inventory_hostname in groups['k8s_master']
  changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"

- name: Generate kubeadm join command (master only)
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: join_command
  when: inventory_hostname in groups['k8s_master']
  changed_when: false

- name: Store join command as host fact so workers can read it
  ansible.builtin.set_fact:
    worker_join_command: "{{ join_command.stdout }}"
  when: inventory_hostname in groups['k8s_master']

# ---- Workers: join the cluster ------------------------------

- name: Check if worker already joined the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf
  when: inventory_hostname in groups['k8s_workers']

- name: Join cluster using command from master01 (workers only)
  ansible.builtin.command:
    cmd: "{{ hostvars['master01']['worker_join_command'] }}"
  when:
    - inventory_hostname in groups['k8s_workers']
    - not kubelet_conf.stat.exists
  register: join_result
  changed_when: "'This node has joined the cluster' in join_result.stdout"

# ---- Verify from master -------------------------------------

- name: Wait for all nodes to become Ready (master only)
  ansible.builtin.command:
    cmd: kubectl get nodes
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: nodes_output
  retries: 12
  delay: 15
  until: >
    'master01'    in nodes_output.stdout and
    'worker-red'  in nodes_output.stdout and
    'worker-blue' in nodes_output.stdout
  when: inventory_hostname in groups['k8s_master']
  changed_when: false

- name: Show cluster node status
  ansible.builtin.debug:
    msg: "{{ nodes_output.stdout_lines }}"
  when: inventory_hostname in groups['k8s_master']
