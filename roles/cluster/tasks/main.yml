---
# ============================================================
# Role: cluster
# Runs on: ALL nodes (k8s_cluster)
# Purpose:
#   Master  → kubeadm init, kubectl config, Flannel CNI,
#             generate join command
#   Workers → kubeadm join using join command from master
# Key concepts: register, set_fact, hostvars, when, command
# ============================================================

# ---- Master: initialise the control plane -------------------

- name: Check if cluster is already initialised
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf_stat
  when: inventory_hostname in groups['k8s_master']

- name: Initialise Kubernetes cluster (master only)
  ansible.builtin.command:
    cmd: >
      kubeadm init
      --pod-network-cidr={{ pod_network_cidr }}
      --service-cidr={{ service_cidr }}
      --apiserver-advertise-address={{ ansible_default_ipv4.address }}
  register: kubeadm_init
  when:
    - inventory_hostname in groups['k8s_master']
    - not admin_conf_stat.stat.exists
  changed_when: kubeadm_init.rc is defined and kubeadm_init.rc == 0

- name: Create .kube directory for {{ kube_user }} (master only)
  ansible.builtin.file:
    path: "{{ kubeconfig_path | dirname }}"
    state: directory
    owner: "{{ kube_user }}"
    group: "{{ kube_user }}"
    mode: "0755"
  when: inventory_hostname in groups['k8s_master']

- name: Copy admin.conf to {{ kube_user }} kubeconfig (master only)
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ kubeconfig_path }}"
    remote_src: true
    owner: "{{ kube_user }}"
    group: "{{ kube_user }}"
    mode: "0600"
  when: inventory_hostname in groups['k8s_master']

- name: Wait for Kubernetes API server to be ready (master only)
  ansible.builtin.wait_for:
    host: "{{ ansible_default_ipv4.address }}"
    port: "{{ k8s_api_port }}"
    delay: 15
    timeout: 180
  when: inventory_hostname in groups['k8s_master']

- name: Download Flannel manifest (master only)
  ansible.builtin.get_url:
    url: "{{ flannel_manifest_url }}"
    dest: /tmp/kube-flannel.yml
    mode: "0644"
    force: true
  retries: 5
  delay: 15
  register: flannel_download
  until: flannel_download is succeeded
  when: inventory_hostname in groups['k8s_master']

- name: Install Flannel CNI network plugin (master only)
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/kube-flannel.yml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: flannel_apply
  when: inventory_hostname in groups['k8s_master']
  changed_when: "'created' in flannel_apply.stdout or 'configured' in flannel_apply.stdout"

- name: Generate kubeadm join command (master only)
  ansible.builtin.command:
    cmd: kubeadm token create --print-join-command
  register: join_command
  when: inventory_hostname in groups['k8s_master']
  changed_when: false

- name: Store join command as host fact so workers can read it
  ansible.builtin.set_fact:
    worker_join_command: "{{ join_command.stdout }}"
  when: inventory_hostname in groups['k8s_master']

# ---- Workers: join the cluster ------------------------------

- name: Check if worker already joined the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf
  when: inventory_hostname in groups['k8s_workers']

- name: Join cluster using command from master (workers only)
  ansible.builtin.command:
    cmd: "{{ hostvars[groups['k8s_master'][0]]['worker_join_command'] }}"
  when:
    - inventory_hostname in groups['k8s_workers']
    - not kubelet_conf.stat.exists
    - hostvars[groups['k8s_master'][0]]['worker_join_command'] is defined
  register: join_result
  changed_when: "'This node has joined the cluster' in join_result.stdout"

# ---- Verify from master -------------------------------------

- name: Wait for all nodes to become Ready (master only)
  ansible.builtin.command:
    cmd: kubectl get nodes
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: nodes_output
  retries: 12
  delay: 15
  until: nodes_output.stdout.count(' Ready ') >= groups['k8s_cluster'] | length
  when: inventory_hostname in groups['k8s_master']
  changed_when: false

- name: Show cluster node status
  ansible.builtin.debug:
    msg: "{{ nodes_output.stdout_lines }}"
  when: inventory_hostname in groups['k8s_master']
