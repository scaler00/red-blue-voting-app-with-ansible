---
# ============================================================
# Role: application
# Purpose: Deploy the Voting Application to Kubernetes
# ============================================================

- name: Clone the Voting Application repository
  ansible.builtin.git:
    repo: "{{ app_repo_url }}"
    dest: "{{ app_repo_dest }}"
    version: main
    force: false
  become: true

- name: Create voting application namespace from template
  ansible.builtin.template:
    src: namespace.yaml.j2
    dest: /tmp/namespace-{{ app_namespace }}.yaml
    mode: "0644"

- name: Apply namespace manifest
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/namespace-{{ app_namespace }}.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: ns_result
  changed_when: "'created' in ns_result.stdout or 'configured' in ns_result.stdout"

- name: Generate Flask secret manifest from template
  ansible.builtin.template:
    src: flask-secret.yaml.j2
    dest: /tmp/flask-secret.yaml
    mode: "0600"

- name: Apply Flask secret
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/flask-secret.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: secret_result
  changed_when: "'created' in secret_result.stdout or 'configured' in secret_result.stdout"

- name: Deploy Redis
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/redis-deployment.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: redis_deploy
  changed_when: "'created' in redis_deploy.stdout or 'configured' in redis_deploy.stdout"

- name: Deploy Redis Service
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/redis-service.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: redis_svc
  changed_when: "'created' in redis_svc.stdout or 'configured' in redis_svc.stdout"

- name: Deploy PostgreSQL
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/db-deployment.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: db_deploy
  changed_when: "'created' in db_deploy.stdout or 'configured' in db_deploy.stdout"

- name: Deploy PostgreSQL Service
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/db-service.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: db_svc
  changed_when: "'created' in db_svc.stdout or 'configured' in db_svc.stdout"

- name: Deploy Vote app
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/vote-deployment.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: vote_deploy
  changed_when: "'created' in vote_deploy.stdout or 'configured' in vote_deploy.stdout"

- name: Deploy Vote Service
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/vote-service.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: vote_svc
  changed_when: "'created' in vote_svc.stdout or 'configured' in vote_svc.stdout"

- name: Deploy Worker
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/worker-deployment.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: worker_deploy
  changed_when: "'created' in worker_deploy.stdout or 'configured' in worker_deploy.stdout"

- name: Deploy Result app
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/result-deployment.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: result_deploy
  changed_when: "'created' in result_deploy.stdout or 'configured' in result_deploy.stdout"

- name: Deploy Result Service
  ansible.builtin.command:
    cmd: kubectl apply -f {{ app_repo_dest }}/k8s-specifications/result-service.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: result_svc
  changed_when: "'created' in result_svc.stdout or 'configured' in result_svc.stdout"

- name: Wait for all application pods to be running
  ansible.builtin.command:
    cmd: kubectl get pods -n {{ app_namespace }}
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: pods_status
  retries: 15
  delay: 20
  until: "'0/1' not in pods_status.stdout and 'Pending' not in pods_status.stdout"
  changed_when: false

- name: Display all pods in voting namespace
  ansible.builtin.debug:
    msg: "{{ pods_status.stdout_lines }}"

- name: Display all services
  ansible.builtin.command:
    cmd: kubectl get svc -n {{ app_namespace }}
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  register: svc_output
  changed_when: false

- name: Show services
  ansible.builtin.debug:
    msg: "{{ svc_output.stdout_lines }}"
